<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Quiz Platform</title>
    
    <!-- CSRF Token for frontend protection -->
    <meta name="csrf-token" content="{{ csrf_token() }}">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f7fa;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔒 Secure Quiz Platform</h1>
            <p>Phase 3 - Secure Authentication & Vulnerability Fixes</p>
        </header>

        <!-- CSRF Token is available for all templates -->
        <meta name="csrf-token" content="{{ csrf_token() }}">

        <script>
        // Helper function to get CSRF token
        function getCSRFToken() {
            const meta = document.querySelector('meta[name="csrf-token"]');
            return meta ? meta.content : '';
        }

        // Secure AJAX/Fetch helper with CSRF protection
        async function makeSecureRequest(url, method = 'POST', data = {}) {
            const headers = {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCSRFToken()
            };

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: headers,
                    body: method !== 'GET' ? JSON.stringify(data) : null,
                    credentials: 'same-origin'   // Important: sends session cookies
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error || 'Request failed');
                }

                return await response.json();
            } catch (error) {
                console.error('Request error:', error);
                throw error;
            }
        }

        // Auto-add CSRF token to all forms on submit (optional enhancement)
        document.addEventListener('DOMContentLoaded', function() {
            const forms = document.querySelectorAll('form');
            forms.forEach(form => {
                form.addEventListener('submit', function(e) {
                    // If you use traditional form submit, CSRF is already handled by Flask-WTF
                });
            });
        });
        </script>

        <!-- Main content block -->
        {% block content %}{% endblock %}
    </div>
</body>
</html>
